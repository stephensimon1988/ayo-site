<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYÓ — A hello in every sip</title>
<meta name="description" content="AYÓ — Filipino-inspired tea. A hello in every sip. Coming soon.">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    background:#c8b99c;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* Frame keeps the exact image aspect ratio while fitting the viewport */
  .frame{
    position:relative;
    line-height:0;
  }
  .frame img{
    display:block;
    width:100%;
    height:100%;
    object-fit:contain;
  }

  .frame--desktop{
    aspect-ratio:1672 / 941;
    width:min(100vw, calc(100vh * 1672 / 941));
    height:min(100vh, calc(100vw * 941 / 1672));
  }
  .frame--mobile{
    aspect-ratio:941 / 1672;
    width:min(100vw, calc(100vh * 941 / 1672));
    height:min(100vh, calc(100vw * 1672 / 941));
  }

  /* Clickable hotspots over the buttons in the artwork */
  .hotspot{
    position:absolute;
    display:block;
    cursor:pointer;
  }

  .frame--mobile{ display:none; }

  @media (max-aspect-ratio: 1/1){
    .frame--desktop{ display:none; }
    .frame--mobile{ display:block; }
  }
</style>
</head>
<body>

  <!-- Desktop / landscape artwork -->
  <div class="frame frame--desktop">
    <img src="assets/img/AYO_PL_Horizontal_01.jpg" alt="AYÓ — Filipino-inspired tea. A hello in every sip. Coming soon.">
    <a class="hotspot" href="#waitlist" aria-label="Join the waitlist"
       style="left:5.4%; top:74.0%; width:18.5%; height:6.6%;"></a>
    <a class="hotspot" href="https://instagram.com/drinkayo" target="_blank" rel="noopener" aria-label="Follow @drinkAYO"
       style="left:25.4%; top:74.0%; width:16.6%; height:6.6%;"></a>
  </div>

  <!-- Mobile / portrait artwork -->
  <div class="frame frame--mobile">
    <img src="assets/img/AYO_PL_Vertical.jpg" alt="AYÓ — Filipino-inspired tea. A hello in every sip. Coming soon.">
    <a class="hotspot" href="#waitlist" aria-label="Join the waitlist"
       style="left:13.8%; top:48.2%; width:36.8%; height:4.0%;"></a>
    <a class="hotspot" href="https://instagram.com/drinkayo" target="_blank" rel="noopener" aria-label="Follow @drinkAYO"
       style="left:13.8%; top:53.9%; width:36.8%; height:4.0%;"></a>
  </div>

</body>
</html>
